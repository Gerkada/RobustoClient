name: Weekly Engine Update

on:
  schedule:
    # Run every Monday at 3:00 AM
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          ref: main

      - name: Update space-station-14 submodule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure the bot's name for commits
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Download the latest version
          git submodule update --remote space-station-14
          
          # Check for changes. If there are any, commit, push, and BREW COFFEE.
          if [[ -n $(git status -s space-station-14) ]]; then
            git add space-station-14
            git commit -m "chore: update space-station-14 submodule to latest upstream"
            git push
            echo "Submodule successfully updated and pushed."
            
            gh workflow run release.yml --ref main 
            
          else
            echo "Engine is already up to date. Nothing to commit."
          fi